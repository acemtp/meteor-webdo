---
  settings:
    import/resolver: meteor
  parser: babel-eslint
  extends: 
    - airbnb
    - plugin:react/recommended
  env:
    meteor: true
    node: true
    browser: true
    es6: true
  globals:
    Accounts: false
    UserAccounts: false
    AccountsTemplates: false
    moment: false
    AutoForm: false
    check: false
    console: false
    T9n: false
    toastr: false
    SubsManager: false
    UI: true
    profile: true
  parserOptions:
    ecmaVersion: 6
    sourceType: "module"
    ecmaFeatures:
      jsx: true
  rules:
    max-len: 1
    curly:
      - 2
      - "multi"
    quotes:
      - 2
      - 'single'
      - 'avoid-escape'
    object-shorthand:
      - "error"
      - "always"
      -
        "avoidQuotes": false
    no-console: 0
    no-underscore-dangle: 0
    object-curly-spacing: 0
    key-spacing: 0
    prefer-arrow-callback: 0
    no-nested-ternary: 0
    react/jsx-filename-extension: 0
    import/extensions:
      - off
      - never
    jsx-a11y/anchor-is-valid:
      - error
      -
        components:
          - Link
        specialLink:
          - to
    import/no-absolute-path: 0

