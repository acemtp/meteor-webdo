# Defines a user type and its fields
type User {
 _id: ID
 username: String
 emails: [Email]
 profile: UserProfile
}
# Defines a user profile type and its fields
type UserProfile {
 avatar: String
 birthday: Date
 description: String
 dislike: String
 like: String 
}
# defines Email type and its fields
type Email {
 address: String
 verified: Boolean
}